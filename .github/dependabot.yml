# Dependabot — automated dependency updates
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# PRs target `develop`. CI (`quality`, `security`) must pass before merge.

version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Mexico_City
    target-branch: develop
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - pip
    commit-message:
      prefix: chore
      include: scope
    groups:
      fastapi-stack:
        patterns:
          - fastapi
          - uvicorn*
          - starlette
          - python-multipart
        update-types:
          - minor
          - patch
      sqlalchemy-stack:
        patterns:
          - sqlalchemy*
          - alembic
        update-types:
          - minor
          - patch
      kafka-and-security:
        patterns:
          - aiokafka
          - cryptography
          - pyseto
        update-types:
          - minor
          - patch
      pip-patch-minor:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Mexico_City
    target-branch: develop
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore
      include: scope
    groups:
      github-actions:
        patterns:
          - '*'

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Mexico_City
    target-branch: develop
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: chore
      include: scope
