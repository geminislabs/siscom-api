name: Quality Checks

on:
  push:
    branches: ["develop", "main"]
  pull_request:
    branches: ["develop", "main"]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check code formatting (Black)
        run: |
          black --check app/ test/

      - name: Lint code (Ruff)
        run: |
          ruff check app/ test/

      - name: Run tests with coverage
        run: |
          pytest test/ --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=40
        env:
          # Database config (individual vars for Settings)
          DB_HOST: "localhost"
          DB_PORT: "5432"
          DB_USERNAME: "test"
          DB_PASSWORD: "test"
          DB_DATABASE: "siscom_test"
          # Auth & Security
          JWT_SECRET_KEY: "test-secret-key-for-ci-minimum-32-chars-long"
          JWT_ALGORITHM: "HS256"
          PASETO_LOCAL_KEY: "test-paseto-key-32-bytes-long!!"
          PASETO_SECRET_KEY: "dGVzdC1zZWNyZXQta2V5LWZvci1jaS10ZXN0cy0zMmI="
          # Kafka
          KAFKA_BOOTSTRAP_SERVERS: "localhost:9092"

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        continue-on-error: true
