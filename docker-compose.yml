version: "3.8"

services:
  siscom-api:
    image: siscom-api:latest
    container_name: siscom-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Configuración de Base de Datos
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_MIN_CONNECTIONS: ${DB_MIN_CONNECTIONS}
      DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS}
      DB_CONNECTION_TIMEOUT_SECS: ${DB_CONNECTION_TIMEOUT_SECS}
      DB_IDLE_TIMEOUT_SECS: ${DB_IDLE_TIMEOUT_SECS}

      # Seguridad JWT (debes configurar esto en tus secrets de GitHub)
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-changeme}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}

      # Seguridad PASETO
      PASETO_SECRET_KEY: ${PASETO_SECRET_KEY}

      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}

      # Métricas StatsD
      STATSD_HOST: ${STATSD_HOST:-localhost}
      STATSD_PORT: ${STATSD_PORT:-8126}
      STATSD_PREFIX: ${STATSD_PREFIX:-siscom_api}

      # Kafka/Redpanda Configuration
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-localhost:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-tracking/data}
      KAFKA_ALERTS_TOPIC: ${KAFKA_ALERTS_TOPIC:-}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:-siscom-api-consumer}
      KAFKA_AUTO_OFFSET_RESET: ${KAFKA_AUTO_OFFSET_RESET:-latest}
      KAFKA_USERNAME: ${KAFKA_USERNAME}
      KAFKA_PASSWORD: ${KAFKA_PASSWORD}

      # Streaming WebSocket (keep-alive < idle timeout del proxy/ALB)
      WEBSOCKET_KEEPALIVE_SECS: ${WEBSOCKET_KEEPALIVE_SECS:-25}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - siscom-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  siscom-network:
    external: true
