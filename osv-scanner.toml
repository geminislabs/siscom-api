# OSV-Scanner config for requirements.txt (repo root).
# Docs: https://google.github.io/osv-scanner/configuration/

# pip is not a runtime dependency. OSV can false-match pip-api / pip_audit tooling
# as package "pip" with an ancient version when scanning requirements.txt.
[[PackageOverrides]]
name = "pip"
ecosystem = "PyPI"
vulnerability.ignore = true
reason = "pip is not pinned in requirements.txt; false positive from pip-* tooling packages"
